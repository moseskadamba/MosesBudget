<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-width: 250px;
            --top-nav-height: 60px;
            --dark-bg: #1e293b;
            --accent-color: #38bdf8;
        }

        body {
            background-color: #f1f5f9;
            overflow-x: hidden;
            width: 100vw;
        }

        #wrapper {
            display: flex;
            width: 100%;
        }

        /* Sidebar Styling */
        #sidebar-wrapper {
            height: 100vh; /* Full viewport height */
            width: var(--sidebar-width);
            background-color: var(--dark-bg);
            transition: all 0.3s ease;
            position: fixed; /* Keep it frozen */
            top: 0;
            left: 0;
            z-index: 1050;
            display: flex;
            flex-direction: column;
        }

        #sidebar-wrapper .sidebar-heading {
            padding: 1.5rem 1.25rem;
            font-size: 1.25rem;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        #sidebar-wrapper .nav-link {
            padding: 1rem 1.5rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        #sidebar-wrapper .nav-link:hover, #sidebar-wrapper .nav-link.active {
            color: white;
            background-color: rgba(255,255,255,0.05);
        }

        /* Page Content Styling */
        #page-content-wrapper {
            width: 100%;
            min-height: 100vh;
            transition: all 0.3s ease;
            margin-left: var(--sidebar-width);
        }

        /* Mobile Toggle State */
        body.sb-sidenav-toggled #sidebar-wrapper {
            left: 0;
        }

        /* 3. Handle Toggle States & Mobile */
        @media (max-width: 767.98px) {
            #sidebar-wrapper {
                left: -260px; /* Hide off-screen on mobile by default */
            }
            #page-content-wrapper {
                margin-left: 0; /* No margin on mobile */
            }
            body.sb-sidenav-toggled #sidebar-wrapper {
                left: 0; /* Slide in on mobile toggle */
            }
        }

        @media (min-width: 768px) {
            /* When toggled (collapsed) on desktop */
            body.sb-sidenav-toggled #sidebar-wrapper {
                left: -260px;
            }
            body.sb-sidenav-toggled #page-content-wrapper {
                margin-left: 0;
            }
        }
        .navbar {
            height: var(--top-nav-height);
            background-color: white !important;
            border-bottom: 1px solid #e2e8f0;
            position: sticky; /* Keeps it at the top */
            top: 0;
            z-index: 1000; /* Stays above the page content */
        }
        #sidebar-wrapper .nav-link[data-bs-toggle="collapse"] {
            cursor: pointer;
        }

        #sidebar-wrapper .collapse .nav-link {
            font-size: 0.85rem;
            padding-left: 2.5rem;
        }
    </style>
</head>
<body>

<div class="d-flex" id="wrapper">
    <div id="sidebar-wrapper" class="shadow">
        <div class="sidebar-heading d-flex justify-content-between align-items-center">
            <span><i class="bi bi-wallet2 me-2 text-info"></i> FinancePro</span>
            <button class="btn text-white d-md-none p-0 border-0" id="sidebarClose">
                <i class="bi bi-x-lg fs-4"></i>
            </button>
        </div>
        <div class="nav flex-column py-3">

            <a href="{% url 'expenses:dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a href="{% url 'expenses:home' %}" class="nav-link d-flex justify-content-between align-items-center {% if request.resolver_match.url_name in 'home,add_expense' %}active fw-bold text-white{% endif %}">
                <span><i class="bi bi-cart-dash"></i> Expenses</span>
            </a>
            <a href="{% url 'expenses:earning_list' %}" class="nav-link d-flex justify-content-between align-items-center {% if request.resolver_match.url_name in 'add_income,earning_list,edit_earning' %}active fw-bold text-white{% endif %}">
                <span><i class="bi bi-graph-up-arrow"></i> Earnings</span>
            </a>
            <a href="{% url 'expenses:category_list' %}" class="nav-link d-flex justify-content-between align-items-center {% if request.resolver_match.url_name in 'add_category,category_list' %}active fw-bold text-white{% endif %}">
                <span><i class="bi bi-tags"></i> Categories</span>
            </a>
            <a href="{% url 'expenses:source_list' %}" class="nav-link d-flex justify-content-between align-items-center {% if request.resolver_match.url_name in 'add_source,source_list' %}active fw-bold text-white{% endif %}">
                <span><i class="bi bi-cash-coin"></i> Sources</span>
            </a>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse"
               href="#reportsCollapse"
               role="button"
               aria-expanded="false"
               aria-controls="reportsCollapse">
                <span><i class="bi bi-file-earmark-bar-graph"></i> Reports</span>
                <i class="bi bi-chevron-down small"></i>
            </a>
            <div class="collapse {% if 'report' in request.resolver_match.url_name %}show{% endif %}" id="reportsCollapse">
                <div class="nav flex-column ps-4">
                    <a href="{% url 'expenses:expense_reports' %}" class="nav-link py-2 small">
                        <i class="bi bi-dot"></i> Expense Reports
                    </a>
                    <a href="{% url 'expenses:earning_reports' %}" class="nav-link py-2 small">
                        <i class="bi bi-dot"></i> Earning Reports
                    </a>
                </div>
            </div>
            <hr class="mx-3">
            <a href="{% url 'expenses:change_password' %}" class="nav-link {% if request.resolver_match.url_name == 'change_password' %}active{% endif %}">
                <i class="bi bi-gear"></i> Change Password
            </a>
            <a href="{% url 'expenses:logout' %}" class="text-danger nav-link {% if request.resolver_match.url_name == 'logout' %}active{% endif %}">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>

        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light px-4">
            <button class="btn btn-outline-dark border-0" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>

            <div class="ms-auto d-flex align-items-center">
                <a href="#" class="d-flex align-items-center text-decoration-none text-dark">
                    <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=0D8ABC&color=fff" class="rounded-circle me-2" width="35">
                    {% if user.is_authenticated %}
                        <span class="navbar-text me-3">Welcome, {{ user.username }}</span>
                    {% else %}
                        <a href="{% url 'management:login' %}" class="btn btn-primary">Login</a>
                    {% endif %}
                </a>
            </div>
        </nav>

        <div class="container-fluid p-4">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', event => {
        const sidebarToggle = document.body.querySelector('#sidebarToggle');
        const sidebarClose = document.body.querySelector('#sidebarClose'); // New selector

        // Function to toggle the class
        const toggleSidebar = (e) => {
            e.preventDefault();
            document.body.classList.toggle('sb-sidenav-toggled');
        };

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', toggleSidebar);
        }

        if (sidebarClose) {
            sidebarClose.addEventListener('click', toggleSidebar);
        }
    });
</script>
</body>
</html>
