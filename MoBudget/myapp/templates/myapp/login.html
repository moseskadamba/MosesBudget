{% load widget_tweaks %}
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        {% load static %}
        <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    </head>
    <body>
        <div class="container min-vh-100 d-flex justify-content-center align-items-center">
            <form method="post">
                {% csrf_token %}
                <h1 class="h3 mb-3 font-weight-normal">Login Form</h1>
                {% render_field form.username placeholder="Username" class+="form-control form-control-lg" %}
                <br>
                {% render_field form.password placeholder="Password" class+="form-control form-control-lg " %}
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-5">Login</button>
                <p>Don't have an account? <a href="{% url 'expenses:signup' %}">Register</a></p>
            </form>
        </div>
    </body>
</html>
