<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Dashboard | SpendWise</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
            <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">
                        <span id="toastMessage">Action completed successfully!</span>
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="modal" data-bs-target="#successToast" aria-label="Close"></button>
                </div>
            </div>
        </div>
        <nav class="navbar navbar-expand-lg navbar-custom py-3 mb-4">
            <div class="container">
                <a class="navbar-brand" href="{% url 'expenses:home' %}">SpendWise</a>
                <div class="d-flex align-items-center">
                    <span class="me-3 text-muted d-none d-md-block">Hello, <strong>{{ user.username }}</strong></span>
                    <a class="nav-link" href="{% url 'expenses:settings' %}"> <i class="bi bi-gear"></i> Settings </a>
                    <a class="btn btn-outline-danger btn-sm px-3 shadow-sm" href="{% url 'expenses:logout' %}">Logout</a>
                </div>
            </div>
        </nav>
        <div class="container mt-5">
            <div class="row justify-content-center text-center">
                <div class="col-md-5">
                    <div class="card border-0 shadow-sm p-4">
                        <div class="card-body">
                            <div class="mb-4">
                                <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                                    <i class="bi bi-check-lg" style="font-size: 2.5rem;"></i>
                                </div>
                            </div>

                            <h2 class="fw-bold text-dark">Password Updated!</h2>
                            <p class="text-muted mt-3">
                                Your password has been changed successfully. Your account is now more secure.
                            </p>

                            <div class="d-grid gap-2 mt-4">
                                <a href="{% url 'expenses:home' %}" class="btn btn-primary btn-lg">
                                    Back to Dashboard
                                </a>
                                <a href="{% url 'expenses:settings' %}" class="btn btn-link text-secondary text-decoration-none">
                                    Go to Settings
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
