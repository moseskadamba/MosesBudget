<div class="modal fade" id="addExpenseModal" tabindex="-1" aria-labelledby="addExpenseModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 20px;">
            <div class="modal-header border-0 pt-4 px-4 pb-0">
                <h3 class="modal-title fw-bold" id="addExpenseModalLabel">
                    <i class="bi bi-person-plus-fill text-primary me-2"></i>Add Expense
                </h3>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="card">
                <div class="card-body">
                    <form method="post" id="expenseForm">
                        {% csrf_token %}
                        <input type="hidden" name="submit_expense" value="1">

                        {% if form.non_field_errors %}
                            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label">Amount ($)</label>
                            {{ form.amount }}
                            <div class="text-danger">{{ form.amount.errors }}</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            {{ form.category }}
                            <div class="text-danger">{{ form.category.errors }}</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            {{ form.date }}
                            <div class="text-danger">{{ form.date.errors }}</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            {{ form.description }}
                            <div class="text-danger">{{ form.description.errors }}</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" id="addAnotherBtn" class="btn btn-success">
                                Save and Add Another
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
    .modal-backdrop { z-index: 1050 !important; }
    #addExpenseModal { z-index: 1060 !important; }
</style>
<script>
    document.getElementById('addAnotherBtn').addEventListener('click', function() {
        const form = document.getElementById('expenseForm');
        const formData = new FormData(form);

        fetch(window.location.href, { // Submits to current page
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': '{{ csrf_token }}' // Direct access to token
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                // 1. Show the success toast (reusing your toast logic)
                const toastMsg = document.getElementById('toastMessage');
                toastMsg.textContent = data.message;
                new bootstrap.Toast(document.getElementById('successToast')).show();

                // 2. Clear the form fields
                form.reset();

                // 3. Optional: Refocus the first field (Amount)
                document.querySelector('[name="amount"]').focus();
            } else {
                alert("Error: " + JSON.stringify(data.errors));
            }
        })
        .catch(error => console.error('Error:', error));
    });
</script>
